worker_processes auto;
worker_cpu_affinity auto;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
    accept_mutex off;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Configuración de logs
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Configuración básica de rendimiento
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    types_hash_max_size 2048;
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;

    # Configuración de buffers
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;

    # Compresión Gzip (compatible con Alpine Linux)
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # Configuración de cache para imágenes
    map $sent_http_content_type $cache_control {
        default                    "public, max-age=31536000";
        "text/html"               "public, max-age=0, must-revalidate";
        "text/css"                "public, max-age=31536000, immutable";
        "application/javascript"  "public, max-age=31536000, immutable";
        "image/png"               "public, max-age=31536000, immutable";
        "image/jpg"               "public, max-age=31536000, immutable";
        "image/jpeg"              "public, max-age=31536000, immutable";
        "image/webp"              "public, max-age=31536000, immutable";
        "image/svg+xml"           "public, max-age=31536000, immutable";
        "image/x-icon"            "public, max-age=31536000, immutable";
        "font/woff"               "public, max-age=31536000, immutable";
        "font/woff2"              "public, max-age=31536000, immutable";
    }

    # Configuración de rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;

    # Servidor principal
    server {
        listen 8080;
        server_name localhost;
        root /app/dist/portal-startcompanies/browser;

        # Headers de seguridad
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self';" always;

        # Cache headers dinámicos
        add_header Cache-Control $cache_control always;

        # Endpoint de status para nginx-exporter
        location = /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }

        # Health check endpoint para Docker
        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Configuración para robots.txt y sitemap
        location = /robots.txt {
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        location = /sitemap.xml {
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        # Configuración para favicon
        location = /favicon.ico {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Configuración para archivos estáticos (debe ir ANTES del proxy general)
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Vary "Accept-Encoding";
            
            # Intentar servir WebP para imágenes
            location ~* \.(jpg|jpeg|png)$ {
                add_header Vary "Accept";
                try_files $uri.webp $uri =404;
            }
        }

        # Configuración para CSS y JS
        location ~* \.(css|js)$ {
            expires 1h;
            add_header Cache-Control "public, max-age=3600, must-revalidate";
            add_header Vary "Accept-Encoding";
        }

        # Configuración para fuentes
        location ~* \.(woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Access-Control-Allow-Origin "*";
        }

        # Configuración para imágenes
        location ~* \.(jpg|jpeg|png|gif|ico|webp|svg)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Vary "Accept-Encoding";
            
            # Intentar servir WebP si está disponible
            location ~* \.(jpg|jpeg|png)$ {
                add_header Vary "Accept";
                try_files $uri.webp $uri =404;
            }
        }

        # Proxy para la API SSR con rate limiting (DEBE ir AL FINAL)
        location / {
            # Aplicar rate limiting solo a endpoints críticos
            limit_req zone=api burst=20 nodelay;
            
            proxy_pass http://localhost:4000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Timeouts optimizados
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffers optimizados
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        # Configuración de error pages
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        # Configuración para archivos de error
        location = /404.html {
            internal;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        location = /50x.html {
            internal;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }
    }
}
