worker_processes 1;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Configuración de logs
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Configuración básica de rendimiento
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # Compresión Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        image/svg+xml;

    # Compresión Brotli (más eficiente que Gzip)
    brotli on;
    brotli_comp_level 6;
    brotli_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        image/svg+xml;

    # Configuración de cache para imágenes
    map $sent_http_content_type $cache_control {
        default                    "public, max-age=31536000";
        "text/html"               "public, max-age=0, must-revalidate";
        "text/css"                "public, max-age=31536000, immutable";
        "application/javascript"  "public, max-age=31536000, immutable";
        "image/png"               "public, max-age=31536000, immutable";
        "image/jpg"               "public, max-age=31536000, immutable";
        "image/jpeg"              "public, max-age=31536000, immutable";
        "image/webp"              "public, max-age=31536000, immutable";
        "image/svg+xml"           "public, max-age=31536000, immutable";
        "image/x-icon"            "public, max-age=31536000, immutable";
        "font/woff"               "public, max-age=31536000, immutable";
        "font/woff2"              "public, max-age=31536000, immutable";
    }

    # Servidor principal
    server {
        listen 4000;
        server_name localhost;
        root /app/dist/portal-startcompanies/browser;

        # Headers de seguridad
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Cache headers dinámicos
        add_header Cache-Control $cache_control always;

        # Health check endpoint
        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Configuración específica para imágenes
        location ~* \.(jpg|jpeg|png|gif|ico|webp|svg)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Vary "Accept-Encoding";
            
            # Intentar servir WebP si está disponible
            location ~* \.(jpg|jpeg|png)$ {
                add_header Vary "Accept";
                try_files $uri.webp $uri =404;
            }
        }

        # Configuración para CSS y JS
        location ~* \.(css|js)$ {
            expires 1h;
            add_header Cache-Control "public, max-age=3600, must-revalidate";
            add_header Vary "Accept-Encoding";
        }

        # Configuración para fuentes
        location ~* \.(woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Access-Control-Allow-Origin "*";
        }

        # Configuración para archivos estáticos
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Vary "Accept-Encoding";
            
            # Intentar servir WebP para imágenes
            location ~* \.(jpg|jpeg|png)$ {
                add_header Vary "Accept";
                try_files $uri.webp $uri =404;
            }
        }

        # Configuración para robots.txt y sitemap
        location = /robots.txt {
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        location = /sitemap.xml {
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        # Configuración para favicon
        location = /favicon.ico {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Configuración para Angular SSR (sin proxy, directo)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Configuración de error pages
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        # Configuración para archivos de error
        location = /404.html {
            internal;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        location = /50x.html {
            internal;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }
    }
}
