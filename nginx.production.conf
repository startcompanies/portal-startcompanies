worker_processes 1;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Configuración de logs
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Configuración básica de rendimiento
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # Compresión Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        image/svg+xml;

    # Compresión Brotli (más eficiente que Gzip)
    brotli on;
    brotli_comp_level 6;
    brotli_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        image/svg+xml;

    # Configuración de cache para imágenes
    map $sent_http_content_type $cache_control {
        default                    "public, max-age=31536000";
        "text/html"               "public, max-age=0, must-revalidate";
        "text/css"                "public, max-age=31536000, immutable";
        "application/javascript"  "public, max-age=31536000, immutable";
        "image/png"               "public, max-age=31536000, immutable";
        "image/jpg"               "public, max-age=31536000, immutable";
        "image/jpeg"              "public, max-age=31536000, immutable";
        "image/webp"              "public, max-age=31536000, immutable";
        "image/svg+xml"           "public, max-age=31536000, immutable";
        "image/x-icon"            "public, max-age=31536000, immutable";
        "font/woff"               "public, max-age=31536000, immutable";
        "font/woff2"              "public, max-age=31536000, immutable";
    }

    # Servidor principal
    server {
        listen 4000;
        server_name localhost;
        root /app/dist/portal-startcompanies/browser;

        # Headers de seguridad
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # HSTS (HTTP Strict Transport Security) - Solo en HTTPS
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        
        # Content Security Policy (CSP) básico
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://app.cal.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://app.cal.com; frame-src https://app.cal.com;" always;

        # Cache headers dinámicos
        add_header Cache-Control $cache_control always;

        # Health check endpoint
        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Configuración específica para imágenes
        location ~* \.(jpg|jpeg|png|gif|ico|webp|svg)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Vary "Accept-Encoding";
            
            # Intentar servir WebP si está disponible
            location ~* \.(jpg|jpeg|png)$ {
                add_header Vary "Accept";
                try_files $uri.webp $uri =404;
            }
        }

        # Configuración para CSS y JS
        location ~* \.(css|js)$ {
            expires 1h;
            add_header Cache-Control "public, max-age=3600, must-revalidate";
            add_header Vary "Accept-Encoding";
        }

        # Configuración para fuentes
        location ~* \.(woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Access-Control-Allow-Origin "*";
        }

        # Configuración para archivos estáticos
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Vary "Accept-Encoding";
            
            # Intentar servir WebP para imágenes
            location ~* \.(jpg|jpeg|png)$ {
                add_header Vary "Accept";
                try_files $uri.webp $uri =404;
            }
        }

        # Configuración para robots.txt y sitemaps
        location = /robots.txt {
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        location = /sitemap.xml {
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
            add_header Content-Type "application/xml; charset=utf-8";
            try_files $uri =404;
        }

        location = /sitemap-index.xml {
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
            add_header Content-Type "application/xml; charset=utf-8";
            try_files $uri =404;
        }

        location = /sitemap-images.xml {
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
            add_header Content-Type "application/xml; charset=utf-8";
            try_files $uri =404;
        }

        # Configuración para favicon
        location = /favicon.ico {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Configuración para Angular SSR (sin proxy, directo)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Configuración de error pages para Angular
        error_page 404 /error-404;
        error_page 500 502 503 504 /error-404;

        # Location para error-404 (ruta de Angular)
        location = /error-404 {
            internal;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
            try_files $uri $uri/ /index.html;
        }
        
        # Configuración para URLs no encontradas (404 real)
        location ~ ^/(?!error-404|robots\.txt|sitemap.*\.xml|assets|favicon\.ico).*$ {
            try_files $uri $uri/ /index.html;
        }

        # Configuración específica para rutas de Angular
        location ~ ^/(nosotros|contacto|abre-tu-llc|apertura-banco-relay|apertura-llc|renovar-llc|form-apertura-relay|planes|blog|error-404) {
            try_files $uri $uri/ /index.html;
        }
        
        # Evitar que Angular intercepte sitemaps y robots.txt
        location ~ ^/(robots\.txt|sitemap.*\.xml)$ {
            try_files $uri =404;
        }

        # ===== REDIRECCIONES 301 PARA SEO =====
        
        # Redirecciones de artículos de blog
        location = /que-es-etbus-en-ee-uu-ventajas-fiscales-para-tu-llc/ {
            return 301 /blog;
        }
        
        location = /como-crear-una-llc-en-nuevo-mexico-2/ {
            return 301 /blog;
        }
        
        location = /recibir-euros-en-argentina-con-payoneer-usando-tu-llc/ {
            return 301 /blog;
        }
        
        location = /cual-es-el-mejor-estado-para-abrir-una-llc/ {
            return 301 /blog;
        }
        
        location = /recibe-pagos-en-euros-en-latam-a-traves-de-tu-llc-con-payoneer/ {
            return 301 /blog;
        }
        
        location = /como-abrir-una-llc-en-ee-uu-desde-argentina-guia-completa/ {
            return 301 /blog;
        }
        
        location = /como-abrir-una-llc-siendo-no-residente-en-ee-uu/ {
            return 301 /blog;
        }
        
        location = /como-una-llc-en-ee-uu-puede-solucionar-sus-problemas-de-impuestos-y-fondos-no-declarados/ {
            return 301 /blog;
        }
        
        # Redirecciones de categorías de blog
        location = /category/tu-llc-a-nivel-local/ {
            return 301 /blog;
        }
        
        location = /category/ventajas-de-un-llc/ {
            return 301 /blog;
        }
        
        location = /category/gestionar-una-llc/ {
            return 301 /blog;
        }
        
        location = /category/abrir-llc/ {
            return 301 /blog;
        }
        
        location = /category/proteccion-de-activos-y-ahorros/ {
            return 301 /blog;
        }
        
        location = /category/noticias-y-actualizaciones-sobre-llc/ {
            return 301 /blog;
        }
        
        location = /category/casos-de-uso-llc/ {
            return 301 /blog;
        }
        
        location = /category/formacion-de-llc-en-eeuu/ {
            return 301 /blog;
        }
        
        location = /category/estrategias-empresariales/ {
            return 301 /blog;
        }
        
        # Redirecciones de formularios y thank you
        location = /contrato-oferta/ {
            return 301 /;
        }
        
        location = /presentacion/ {
            return 301 /;
        }
        
        location = /masterclass-thank-you/ {
            return 301 /;
        }
        
        location = /thank-you/ {
            return 301 /;
        }
        
        location = /formulario-de-apertura-de-llc-y-cuenta-bancaria/ {
            return 301 /;
        }
        
        location = /formulario-renovacion-llc/ {
            return 301 /;
        }
        
        location = /masterclass-gratuita/ {
            return 301 /;
        }
        
        # Redirecciones de servicios
        location = /servicios/ {
            return 301 /;
        }
        
        location = /agenda-tu-consulta-gratis/ {
            return 301 /contacto;
        }
        
        location = /abrir-llc/ {
            return 301 /abre-tu-llc;
        }

        # Redirecciones para nuevos formularios de Relay
        location = /form-apertura-fixcal/ {
            return 301 /fixcal;
        }
        
        location = /form-apertura-abotax/ {
            return 301 /abotax;
        }
        
        location = /relay-fixcal/ {
            return 301 /fixcal;
        }
        
        location = /relay-abotax/ {
            return 301 /abotax;
        }

        # Configuración para archivos de error estáticos (eliminada)
        # location = /404.html {
        #     internal;
        #     expires 1d;
        #     add_header Cache-Control "public, max-age=86400";
        # }

        # location = /50x.html {
        #     internal;
        #     expires 1d;
        #     add_header Cache-Control "public, max-age=86400";
        # }
    }
}
