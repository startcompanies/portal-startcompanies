<!-- SEO Base Component -->
<app-seo-base routeKey="blog-post"></app-seo-base>
<app-sc-header></app-sc-header>
<section class="sc-post-hero py-5">
  <app-responsive-image
    [images]="heroImages"
    context="hero"
    loading="eager"
    cssClass="sc-hero-bg"
  >
  </app-responsive-image>
  <div class="container sc-post-hero-content" *ngIf="postArticle">
    <div class="row">
      <div class="col-12 text-start">
        <p class="sc-post-path">
          Blog / {{ postArticle.categories[0].name }} / {{ postArticle.title }}
        </p>
        <h1 class="sc-post-title">
          {{ postArticle.title }}
        </h1>
      </div>
    </div>
  </div>
</section>
<!-- Image Post Section -->
<section class="mb-5">
  <div class="col-12 image-post-container d-flex justify-content-center">
    <picture>
      <img
        src="assets/blog/img_image_4.png"
        alt="Imagen principal del post"
        class="img-fluid rounded-3"
      />
    </picture>
  </div>
</section>
<!--Article body-->
<section class="sc-blog-post-content py-5">
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-10 col-lg-8" [innerHTML]="sanitizedContent">
      </div>
    </div>
  </div>
</section>
<!--Blog Carrusel-->
<app-blog></app-blog>
<app-sc-footer></app-sc-footer>
