<app-seo-base routeKey="blog-post"></app-seo-base>

<app-sc-header *ngIf="isBrowser"></app-sc-header>

<section class="sc-post-hero py-5">
  <app-responsive-image
    [images]="heroImages"
    context="hero"
    loading="eager"
    cssClass="sc-hero-bg">
  </app-responsive-image>

  <div class="container sc-post-hero-content" *ngIf="postArticle">
    <div class="row">
      <div class="col-12 text-start">
        <p class="sc-post-path">
          Blog / {{ postArticle.categories[0].name }} / {{ postArticle.title }}
        </p>
        <h1 class="mt-4 mb-4 sc-post-title">
          {{ postArticle.title }}
        </h1>
      </div>
    </div>
  </div>
</section>

<section *ngIf="postArticle" class="mb-5">
  <div class="mt-5 col-12 image-post-container d-flex justify-content-center">
    <picture>
      <img
        [src]="postArticle.image_url"
        [alt]="postArticle.title"
        class="img-fluid rounded-3"
      />
    </picture>
  </div>
</section>

<!-- Renderizado de contenido dinámico SOLO en navegador -->
<app-post-content *ngIf="isBrowser" [blocks]="contentBlocks"></app-post-content>

<app-blog></app-blog>
<app-sc-footer></app-sc-footer>
