<div class="container px-4">
  <div class="row align-items-center">
    <!-- Columna izquierda - Texto -->
    <div class="col-md-6">
      <h2 class="title fw-bold text-body-emphasis mb-4">
        ¿Quierés que nos <span class="highlight">encarguemos</span> por tí?
      </h2>
      <ul class="list-actions mb-4">
        <li>Revisión de documentos</li>
        <li>Carga completa en Relay</li>
        <li>Acompañamiento paso a paso</li>
        <li>Soporte por WhatsApp</li>
        <li>CTA de contacto</li>
        <li>CTA AHI</li>
        <li><span class="garanty-highlight">Garantía 100%</span> si la cuenta es rechazada</li>
      </ul>
      <a href="#" class="cta-button btn btn-primary btn-lg">
        Que me acompañen paso a paso ($99 USD)
        <i class="bi bi-arrow-right ms-2"></i>
      </a>
    </div>
    
    <!-- Columna derecha - Imagen -->
    <div class="col-md-6 text-center">
      <div class="support-image-container">
        <app-responsive-image
          [images]="supportImages"
          context="content"
          loading="lazy"
          cssClass="support-image">
        </app-responsive-image>
      </div>
    </div>
  </div>
</div>
