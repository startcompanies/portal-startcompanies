<section class="video-section">
  <div class="container">
    <!-- Subtítulo -->
    <div class="subtitle" *ngIf="subtitle">
      {{ subtitle }}
    </div>

    <!-- Título principal -->
    <h1 class="main-title" *ngIf="title">
      <span class="title-part">{{ title }}</span>
      <span class="title-highlight" *ngIf="titleHighlight">{{
        titleHighlight
      }}</span>
    </h1>

    <!-- Descripción -->
    <p class="description" *ngIf="description">
      {{ description }}
    </p>

    <!-- Contenedor del video -->
    <div class="video-container" *ngIf="videoId; else noVideo">
      <app-youtube-player
        [videoId]="videoId"
        [title]="videoTitle"
      ></app-youtube-player>
    </div>

    <ng-template #noVideo>
      <div class="video-placeholder">
        <div class="placeholder-content">
          <span>Video placeholder</span>
        </div>
      </div>
    </ng-template>
  </div>
</section>
