<section class="video-section">
  <div class="container">
    <!-- Subtítulo -->
    <div class="subtitle" *ngIf="subtitle">
      {{ subtitle }}
    </div>

    <!-- Título principal -->
    <h1 class="main-title" *ngIf="title">
      <span class="title-part">{{ title }}</span>
      <span class="title-highlight" *ngIf="titleHighlight">{{
        titleHighlight
      }}</span>
    </h1>

    <!-- Descripción -->
    <p class="description" *ngIf="description">
      {{ description }}
    </p>

    <!-- Contenedor del video -->
    <div class="container px-5">
      <app-wistia-player
        ngSkipHydration
        [mediaId]="videoId"
      ></app-wistia-player>
    </div>
  </div>
</section>
