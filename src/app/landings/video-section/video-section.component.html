<section class="video-section">
    <div class="container">
        <!-- Subtítulo -->
        <div class="subtitle" *ngIf="subtitle">
            {{ subtitle }}
        </div>

        <!-- Título principal -->
        <h1 class="main-title" *ngIf="title">
            <span class="title-part">{{ title }}</span>
            <span class="title-highlight" *ngIf="titleHighlight">{{ titleHighlight }}</span>
        </h1>

        <!-- Descripción -->
        <p class="description" *ngIf="description">
            {{ description }}
        </p>

        <!-- Contenedor del video -->
        <div class="video-container">
            <iframe *ngIf="videoUrl" 
                [src]="getSafeUrl(videoUrl)" 
                [title]="videoTitle" 
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin" 
                allowfullscreen 
                loading="lazy">
            </iframe>
            <div class="video-placeholder" *ngIf="!videoUrl">
                <div class="placeholder-content">
                    <span>Video placeholder</span>
                </div>
            </div>
        </div>
    </div>
</section>
