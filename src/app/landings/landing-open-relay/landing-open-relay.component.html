<app-hero-section>
    <h1 slot="title">
        ¡Lanza tu LLC en EE.UU. en 7 días!
    </h1>
    <p slot="description">
        Crea tu empresa y cuenta en EE.UU. de forma simple, online y con ayuda experta. ¡Vende al mundo sin fronteras!
        <br>
        <strong>¡No pags hasta tener tu cuenta de banco y empresa abierta!</strong>
    </p>
    <ng-container slot="cta-button">
        <a href="#" class="hero-btn-primary d-inline-flex align-items-center justify-content-center" (click)="startProcess($event)">
            Iniciar mi empresa <i class="bi bi-arrow-right ms-2"></i>
        </a>
    </ng-container>
</app-hero-section>
