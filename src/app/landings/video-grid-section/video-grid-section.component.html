<div class="video-grid-section-wrapper">
  <!-- Título principal -->
  <h2 class="main-title" *ngIf="title">
    <span class="title-part">{{ title }}</span>
    <span class="title-highlight" *ngIf="titleHighlight">{{
      titleHighlight
    }}</span>
  </h2>

  <!-- Descripción -->
  <p class="description" *ngIf="description">
    {{ description }}
  </p>

  <!-- Cuadrícula de videos -->
  <div class="video-grid">
    <div class="video-row">
      <div class="video-item">

            referrerpolicy="strict-origin-when-cross-origin"

            loading="lazy"
          >
          </iframe>
        </div>-->
        <div class="video-container" *ngIf="videoIdOne; else noVideo">
          <app-youtube-player
            [videoId]="videoIdOne"
            [title]="videoTitleUno"

        </div>

        <ng-template #noVideo>
          <div class="video-placeholder">
            <div class="placeholder-content">
              <span>Video placeholder</span>
            </div>
          </div>
        </ng-template>
      </div>
      <div class="video-item">
