<app-sc-header></app-sc-header>
<section class="contact-section" #heroSection>
    <div class="contact-container">
        <div class="contact-content">
            <!-- Columna izquierda: Texto -->
            <div class="contact-text">
                <h2 class="contact-title">{{ 'CONTACT.title' | transloco }}</h2>
                <p class="contact-description">{{ 'CONTACT.description' | transloco }}</p>
            </div>
            
            <!-- Columna derecha: Formulario -->
            <div class="contact-form">
                <form class="form-container">
                    <div class="form-group">
                        <label for="name" class="form-label">{{ 'CONTACT.name' | transloco }}</label>
                        <input type="text" id="name" name="name" class="form-input" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email" class="form-label">{{ 'CONTACT.email' | transloco }}</label>
                        <input type="email" id="email" name="email" class="form-input" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="message" class="form-label">{{ 'CONTACT.message' | transloco }}</label>
                        <textarea id="message" name="message" class="form-textarea" rows="4" required></textarea>
                    </div>
                    
                    <button type="submit" class="submit-button">
                        <span>{{ 'CONTACT.send' | transloco }}</span>
                        <svg class="arrow-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>
<app-contact-advice></app-contact-advice>
<app-sc-footer></app-sc-footer>
