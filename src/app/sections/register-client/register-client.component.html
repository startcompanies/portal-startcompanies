<div class="wizard-section">
  <!-- Fondo hero -->
  <app-responsive-image [images]="heroImages" context="hero" loading="eager"
    cssClass="sc-hero-bg"></app-responsive-image>

  <!-- Contenedor principal -->
  <div class="wizard-layout">
    <!-- Columna izquierda (fondo azul) -->
    <div class="wizard-left"></div>

    <!-- Columna derecha (panel blanco que cubre toda la altura) -->
    <div class="wizard-right">
      <div class="wizard-inner">
        <ngx-form-wizard [steps]="steps" [stepperOptions]="stepperOptions"
          finishActionBtnLabel="{{ 'WIZARD.finish' | transloco }}"
          cancelActionBtnLabel="{{ 'WIZARD.cancel' | transloco }}"
          prevActionBtnLabel="{{ 'WIZARD.previous' | transloco }}" nextActionBtnLabel="{{ 'WIZARD.next' | transloco }}"
          (finished)="onFinish()" (cancelled)="onCancel()">
        </ngx-form-wizard>
      </div>
    </div>
  </div>
</div>
