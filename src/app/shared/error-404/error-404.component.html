<app-sc-header></app-sc-header>
<section class="sc-error-hero">
  <app-responsive-image
    [images]="heroImages"
    context="hero"
    loading="eager"
    cssClass="sc-hero-bg"
  ></app-responsive-image>
  <div class="container py-5 text-center">
    <h1 class="error-404-title fw-bold col-lg-6 mx-auto">
      {{ "ERROR-404.title" | transloco }}
    </h1>
    <div class="col-lg-6 mx-auto">
      <p class="error-404-description fw-700 lead mb-4">
        {{ "ERROR-404.description" | transloco }}
      </p>

      <!-- Enlaces adicionales útiles -->
      <div class="mt-4">
        <h6 class="text-muted mb-3 error-404-description">
          {{ "ERROR-404.subtitle" | transloco }}
        </h6>
        <div class="row g-3 justify-content-center">
          <div class="col-6 col-md-3">
            <a [langRouterLink]="'planes'" class="text-decoration-none">
              <div class="card h-100 border-0 shadow-sm">
                <div class="card-body text-center">
                  <i class="bi bi-list-check text-primary fs-4"></i>
                  <p class="card-text small mt-2">
                    {{ "NAVBAR.plans" | transloco }}
                  </p>
                </div>
              </div>
            </a>
          </div>
          <div class="col-6 col-md-3">
            <a [langRouterLink]="'nosotros'" class="text-decoration-none">
              <div class="card h-100 border-0 shadow-sm">
                <div class="card-body text-center">
                  <i class="bi bi-people text-primary fs-4"></i>
                  <p class="card-text small mt-2">
                    {{ "ERROR-404.about_us" | transloco }}
                  </p>
                </div>
              </div>
            </a>
          </div>
          <div class="col-6 col-md-3">
            <a [langRouterLink]="'blog'" class="text-decoration-none">
              <div class="card h-100 border-0 shadow-sm">
                <div class="card-body text-center">
                  <i class="bi bi-journal-text text-primary fs-4"></i>
                  <p class="card-text small mt-2">
                    {{ "NAVBAR.blog" | transloco }}
                  </p>
                </div>
              </div>
            </a>
          </div>
          <div class="col-6 col-md-3">
            <a [langRouterLink]="'contacto'" class="text-decoration-none">
              <div class="card h-100 border-0 shadow-sm">
                <div class="card-body text-center">
                  <i class="bi bi-headset text-primary fs-4"></i>
                  <p class="card-text small mt-2">
                    {{ "ERROR-404.help" | transloco }}
                  </p>
                </div>
              </div>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
<app-sc-footer></app-sc-footer>
