<div class="intl-tel-input-wrapper">
  <input
    #telInput
    type="tel"
    [id]="id"
    [placeholder]="placeholder"
    [required]="required"
    [disabled]="disabled"
    [class.is-invalid]="showInlineErrors && showError && !isValid"
    [class.is-valid]="showInlineErrors && showError && isValid && value"
    class="form-control"
  />
  <div *ngIf="showInlineErrors && showError && !isValid && errorMessage" class="invalid-feedback d-block">
    {{ errorMessage }}
  </div>
</div>
