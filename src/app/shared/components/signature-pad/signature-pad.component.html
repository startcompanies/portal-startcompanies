<div class="signature-pad-container">
  <label class="form-label">
    Firma <span *ngIf="required" class="text-danger">*</span>
  </label>
  <div class="signature-pad-wrapper">
    <canvas
      #canvas
      class="signature-canvas"
      [style.width.px]="width"
      [style.height.px]="height"
    ></canvas>
  </div>
  <div class="signature-actions mt-2">
    <button
      type="button"
      class="btn btn-outline-secondary btn-sm"
      (click)="clear()"
      [disabled]="!hasSignature()"
    >
      <i class="bi bi-x-circle me-1"></i>
      Limpiar
    </button>
    <small class="text-muted ms-2">
      <i class="bi bi-info-circle me-1"></i>
      Dibuja tu firma en el área de arriba usando el mouse o el dedo
    </small>
  </div>
  <div *ngIf="required && formControl?.invalid && formControl?.touched" class="invalid-feedback d-block">
    Por favor, proporciona tu firma
  </div>
</div>
