<div class="service-type-selection-step">
  <h3>{{ 'PANEL.select_service.heading' | transloco }}</h3>
  
  <form [formGroup]="form">
    <div class="service-types-grid">
      <div 
        *ngFor="let service of serviceTypes" 
        class="service-type-card"
        [class.selected]="selectedServiceType === service.value"
        (click)="selectServiceType(service.value)"
      >
        <input
          type="radio"
          [id]="'service-' + service.value"
          [value]="service.value"
          formControlName="serviceType"
          class="service-radio"
        />
        <label [for]="'service-' + service.value" class="service-label">
          <h4>{{ service.labelKey | transloco }}</h4>
          <p>{{ service.descriptionKey | transloco }}</p>
        </label>
      </div>
    </div>
    
    <div 
      *ngIf="serviceType?.touched && serviceType?.invalid" 
      class="text-danger mt-3"
    >
      {{ 'PANEL.select_service.validation_required' | transloco }}
    </div>
  </form>
</div>
