<div class="post-author-section">
  <h3 class="post-author-title">Sobre el <span>autor</span></h3>
    <div class="card author-info-card">
      <div class="card-body author-card-body">
        <div class="author-image">
          <img [src]="authorImage" [alt]="authorName" class="rounded-circle" />
        </div>
        <div class="author-details">
          <p class="author-label">Autor</p>
          <h5 class="author-name">{{ authorName }}</h5>
          <p class="author-description">
            {{ authorDescription }}
          </p>
          <p class="author-follow">Sigueme en:</p>
          <div class="author-socials">
            <a [href]="linkedinUrl" class="author-social is-linkedin" aria-label="LinkedIn" target="_blank" rel="noopener noreferrer">
              <i class="bi bi-linkedin"></i>
            </a>
            <a [href]="facebookUrl" class="author-social is-facebook" aria-label="Facebook" target="_blank" rel="noopener noreferrer">
              <i class="bi bi-facebook"></i>
            </a>
            <a [href]="instagramUrl" class="author-social is-instagram" aria-label="Instagram" target="_blank" rel="noopener noreferrer">
              <i class="bi bi-instagram"></i>
            </a>
            <a [href]="whatsappUrl" class="author-social is-whatsapp" aria-label="WhatsApp" target="_blank" rel="noopener noreferrer">
              <i class="bi bi-whatsapp"></i>
            </a>
            <a [href]="youtubeUrl" class="author-social is-youtube" aria-label="YouTube" target="_blank" rel="noopener noreferrer">
              <i class="bi bi-youtube"></i>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
