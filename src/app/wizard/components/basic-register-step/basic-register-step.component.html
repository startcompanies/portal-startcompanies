<div class="basic-register-step">
  <h4>{{ 'WIZARD.steps.register' | transloco }}</h4>
  <form [formGroup]="form">
    <div class="form-group">
      <label>{{ 'CONTACT.email' | transloco }}</label>
      <input class="form-control" formControlName="email" />
      <div
        *ngIf="form.get('email')?.touched && form.get('email')?.invalid"
        class="text-danger mt-1"
      >
        {{ 'CONTACT.email_required' | transloco }}
      </div>
    </div>
    <div class="form-group">
      <label>{{ 'WIZARD.password' | transloco }}</label>
      <input
        type="password"
        class="form-control"
        formControlName="password"
      />
      <div
        *ngIf="form.get('password')?.touched && form.get('password')?.invalid"
        class="text-danger mt-1"
      >
        {{ 'WIZARD.password_required' | transloco }}
      </div>
    </div>
  </form>
</div>
