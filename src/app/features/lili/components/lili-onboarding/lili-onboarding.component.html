<div class="lili-shell">
  <div class="lili-header">
    <img [src]="onboardingLogo" alt="Start Companies" class="lili-header-logo" />
  </div>

  <div *ngIf="loading" class="lili-loading">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
    <p class="mt-3">Preparando tu formulario bancario...</p>
  </div>

  <div *ngIf="error" class="lili-error">
    <p>Ocurrió un error al cargar el formulario.</p>
    <p>Por favor contactá a soporte o intentá con un nuevo link.</p>
  </div>

  <div id="lili" class="lili-embed" [class.lili-embed-hidden]="loading || error"></div>
</div>
