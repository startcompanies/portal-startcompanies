<div class="generator-layout">
  <div class="generator-container">
    <div class="generator-header">
      <img [src]="startCompaniesLogo" alt="Start Companies" class="generator-logo" />
    </div>

    <div class="generator-card">
      <div class="generator-copy">
        <h2>Crea tu cuenta de Lili con Start Companies</h2>
        <p class="text-muted">
          Completá los datos del cliente para generar un link de acceso válido por 48 horas.
        </p>
      </div>

      <div class="alert alert-danger" *ngIf="error" role="alert">
        {{ error }}
      </div>

      <form (ngSubmit)="submit()" #f="ngForm" class="generator-form">
        <div class="mb-3">
          <label for="email" class="form-label">Correo Electrónico</label>
          <input
            id="email"
            type="email"
            class="form-control"
            [(ngModel)]="form.email"
            name="email"
            placeholder="cliente@ejemplo.com"
            required
          />
        </div>

        <div class="name-row">
          <div class="mb-3">
            <label for="firstName" class="form-label">Nombre</label>
            <input
              id="firstName"
              type="text"
              class="form-control"
              [(ngModel)]="form.firstName"
              name="firstName"
              placeholder="Juan"
            />
          </div>

          <div class="mb-3">
            <label for="lastName" class="form-label">Apellido</label>
            <input
              id="lastName"
              type="text"
              class="form-control"
              [(ngModel)]="form.lastName"
              name="lastName"
              placeholder="Pérez"
            />
          </div>
        </div>

        <div class="mb-3">
          <label for="businessName" class="form-label">Nombre del negocio</label>
          <input
            id="businessName"
            type="text"
            class="form-control"
            [(ngModel)]="form.businessName"
            name="businessName"
            placeholder="Mi Empresa LLC"
          />
        </div>

        <button type="submit" class="btn-submit" [disabled]="!form.email || loading">
          <span *ngIf="!loading">Generar link</span>
          <span *ngIf="loading">Generando...</span>
        </button>
      </form>

      <div *ngIf="generatedLink" class="result-card">
        <p class="result-label">Link generado</p>
        <p class="result-note">Podés compartirlo por email, WhatsApp o el canal que uses con tu cliente.</p>
        <div class="link-box">
          <span class="link-text">{{ generatedLink }}</span>
          <button type="button" class="copy-btn" (click)="copyLink()">
            {{ copied ? 'Copiado' : 'Copiar' }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
