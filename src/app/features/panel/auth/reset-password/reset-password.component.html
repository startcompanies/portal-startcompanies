<div class="reset-password-container">
  <div class="reset-password-header">
    <h2>Restablecer Contraseña</h2>
    <p class="text-muted" *ngIf="!emailSent">
      Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña
    </p>
    <p class="text-success" *ngIf="emailSent">
      Se ha enviado un correo electrónico con las instrucciones para restablecer tu contraseña
    </p>
  </div>

  <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="reset-password-form" *ngIf="!emailSent">
    <div class="mb-3">
      <label for="email" class="form-label">Correo Electrónico</label>
      <input
        type="email"
        id="email"
        class="form-control"
        formControlName="email"
        [class.is-invalid]="email?.invalid && email?.touched"
        placeholder="tu@email.com"
      />
      <div class="invalid-feedback" *ngIf="email?.invalid && email?.touched">
        <span *ngIf="email?.errors?.['required']">El correo es requerido</span>
        <span *ngIf="email?.errors?.['email']">Ingresa un correo válido</span>
      </div>
    </div>

    <button
      type="submit"
      class="btn btn-primary w-100"
      [disabled]="isLoading || resetForm.invalid"
    >
      <span *ngIf="!isLoading">Enviar Instrucciones</span>
      <span *ngIf="isLoading">
        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
        Enviando...
      </span>
    </button>
  </form>

  <div class="mt-4 text-center" *ngIf="emailSent">
    <button
      type="button"
      class="btn btn-outline-primary"
      (click)="emailSent = false"
    >
      Enviar otro correo
    </button>
  </div>

  <div class="mt-4 text-center">
    <a routerLink="/panel/login" class="text-decoration-none">
      <i class="bi bi-arrow-left"></i> Volver al inicio de sesión
    </a>
  </div>
</div>
