<div class="login-container">
  <div class="login-header">
    <h2>Iniciar Sesión</h2>
    <p class="text-muted">Ingresa tus credenciales para acceder al panel</p>
  </div>

  <div class="alert alert-danger" *ngIf="errorMessage" role="alert">
    {{ errorMessage }}
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
    <div class="mb-3">
      <label for="email" class="form-label">Correo Electrónico</label>
      <input
        type="email"
        id="email"
        class="form-control"
        formControlName="email"
        placeholder="tu@email.com"
      />
      <!-- [class.is-invalid]="email?.invalid && email?.touched" -->
      <!-- Validaciones comentadas temporalmente para maquetación -->
      <!-- <div class="invalid-feedback" *ngIf="email?.invalid && email?.touched">
        <span *ngIf="email?.errors?.['required']">El correo es requerido</span>
        <span *ngIf="email?.errors?.['email']">Ingresa un correo válido</span>
      </div> -->
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">Contraseña</label>
      <input
        type="password"
        id="password"
        class="form-control"
        formControlName="password"
        placeholder="••••••••"
      />
      <!-- [class.is-invalid]="password?.invalid && password?.touched" -->
      <!-- Validaciones comentadas temporalmente para maquetación -->
      <!-- <div class="invalid-feedback" *ngIf="password?.invalid && password?.touched">
        <span *ngIf="password?.errors?.['required']">La contraseña es requerida</span>
        <span *ngIf="password?.errors?.['minlength']">La contraseña debe tener al menos 6 caracteres</span>
      </div> -->
    </div>

    <div class="mb-3 d-flex justify-content-between align-items-center">
      <div class="form-check">
        <input type="checkbox" class="form-check-input" id="rememberMe" />
        <label class="form-check-label" for="rememberMe">
          Recordarme
        </label>
      </div>
      <a routerLink="/panel/reset-password" class="text-decoration-none">¿Olvidaste tu contraseña?</a>
    </div>

    <button
      type="submit"
      class="btn btn-primary w-100"
      [disabled]="isLoading"
    >
      <!-- [disabled]="isLoading || loginForm.invalid" -->
      <span *ngIf="!isLoading">Iniciar Sesión</span>
      <span *ngIf="isLoading">
        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
        Iniciando...
      </span>
    </button>
  </form>

  <div class="mt-4 text-center">
    <p class="mb-0">
      ¿No tienes una cuenta?
      <a routerLink="/panel/register" class="text-decoration-none fw-bold">Regístrate aquí</a>
    </p>
  </div>
</div>
