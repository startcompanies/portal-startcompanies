<div class="panel-layout">
  <!-- Modal de idioma (primera vez) -->
  <app-choose-language-modal *ngIf="showLanguageModal" (closed)="onLanguageModalClosed()"></app-choose-language-modal>

  <!-- Sidebar -->
  <aside class="sidebar" [class.collapsed]="!isSidebarOpen">
    <div class="sidebar-header">
      <div class="sidebar-logo-container" *ngIf="isSidebarOpen">
        <app-responsive-image [images]="logoImages" context="logo" loading="eager" cssClass="sidebar-logo">
        </app-responsive-image>
      </div>
      <button class="sidebar-toggle" (click)="toggleSidebar()" type="button">
        <i [class]="isSidebarOpen ? 'bi-chevron-left' : 'bi-chevron-right'"></i>
      </button>
    </div>

    <nav class="sidebar-nav">
      <ul class="nav-list">
        <li *ngFor="let item of menuItems">
          <a
            [routerLink]="item.route"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{exact: true}"
            class="nav-link"
            [title]="!isSidebarOpen ? (item.label | transloco) : ''"
          >
            <i [class]="'bi ' + item.icon"></i>
            <span *ngIf="isSidebarOpen">{{ item.label | transloco }}</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="sidebar-footer">
      <a routerLink="/" class="nav-link">
        <i class="bi-house"></i>
        <span *ngIf="isSidebarOpen">{{ 'PANEL.layout.back_to_site' | transloco }}</span>
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Header -->
    <header class="panel-header">
      <div class="header-left">
        <button class="mobile-menu-toggle" (click)="toggleSidebar()" type="button">
          <i class="bi-list"></i>
        </button>
        <div class="header-titles" *ngIf="!hideLayoutHeader">
          <h1 class="page-title">{{ effectiveTitleKey | transloco }}</h1>
          <p class="page-subtitle text-muted mb-0" *ngIf="panelSubtitleKey">
            {{ panelSubtitleKey | transloco }}
          </p>
        </div>
      </div>
      <div class="header-right">
        <app-notifications></app-notifications>
        <div class="user-menu">
          <div class="dropdown">
            <button class="user-button dropdown-toggle" type="button" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
              <i class="bi-person-circle"></i>
              <span>{{ getUserDisplayName() }}</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
              <li>
                <a class="dropdown-item" routerLink="/panel/settings">
                  <i class="bi-gear me-2"></i>{{ 'PANEL.layout.settings' | transloco }}
                </a>
              </li>
              <li><hr class="dropdown-divider"></li>
              <li>
                <a class="dropdown-item" (click)="logout()" style="cursor: pointer;">
                  <i class="bi-box-arrow-right me-2"></i>{{ 'PANEL.layout.logout' | transloco }}
                </a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </header>

    <!-- Content Area -->
    <main class="content-area">
      <div class="page-wrapper">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
