<div class="notifications-container">
  <button 
    class="notifications-button"
    (click)="toggleDropdown()"
    [class.has-unread]="unreadCount > 0"
    type="button"
  >
    <i class="bi bi-bell"></i>
    <span *ngIf="unreadCount > 0" class="badge bg-danger notification-badge">
      {{ unreadCount > 9 ? '9+' : unreadCount }}
    </span>
  </button>

  <div *ngIf="showDropdown" class="notifications-dropdown">
    <div class="notifications-header">
      <h5>Notificaciones</h5>
      <button 
        *ngIf="unreadCount > 0"
        class="btn btn-sm btn-link text-primary"
        (click)="markAllAsRead()"
      >
        Marcar todas como leídas
      </button>
    </div>

    <div class="notifications-list">
      <div *ngIf="notifications.length === 0" class="empty-notifications">
        <i class="bi bi-bell-slash"></i>
        <p>No hay notificaciones</p>
      </div>

      <div 
        *ngFor="let notification of notifications" 
        class="notification-item"
        [class.unread]="!notification.read"
        [class]="getNotificationClass(notification.type)"
        (click)="markAsRead(notification)"
      >
        <div class="notification-icon">
          <i [class]="getNotificationIcon(notification.type)"></i>
        </div>
        <div class="notification-content">
          <h6 class="notification-title">{{ notification.title }}</h6>
          <p class="notification-message">{{ notification.message }}</p>
          <small class="notification-time">{{ notification.createdAt | date:'short' }}</small>
        </div>
        <button 
          class="btn btn-sm btn-link text-danger notification-delete"
          (click)="deleteNotification(notification, $event)"
          title="Eliminar"
        >
          <i class="bi bi-x"></i>
        </button>
        <div *ngIf="!notification.read" class="unread-indicator"></div>
      </div>
    </div>

    <div class="notifications-footer">
      <a routerLink="/panel/notifications" class="btn btn-sm btn-outline-primary w-100">
        Ver Todas las Notificaciones
      </a>
    </div>
  </div>
</div>
