<div class="panel-cuenta-bancaria-information-step">
  <div class="step-header mb-4">
    <h3 class="step-title">
      <i class="bi bi-bank me-2"></i>
      Información de Cuenta Bancaria
    </h3>
    <p class="text-muted">
      Completa la información para la apertura de tu cuenta bancaria.
    </p>
  </div>

  <!-- Formulario compartido de cuenta bancaria -->
  <div class="form-container">
    <app-cuenta-bancaria-form
      [serviceDataForm]="serviceDataForm"
      [usStates]="usStates"
      [fileUploadStates]="fileUploadStates"
      [currentSection]="currentSection"
      (fileSelected)="onFileSelected($event)"
      (fileCleared)="onFileCleared($event)"
      (addOwnerRequested)="onAddOwnerRequested()"
      (removeOwnerRequested)="onRemoveOwnerRequested($event)"
    ></app-cuenta-bancaria-form>
  </div>

  <!-- Mensaje de error de guardado -->
  <div class="alert alert-danger mt-3" *ngIf="saveError">
    <i class="bi bi-exclamation-triangle me-2"></i>
    {{ saveError }}
  </div>

  <!-- Navegación entre secciones -->
  <div class="section-actions" *ngIf="shouldShowSectionNavigation">
    <button
      type="button"
      class="btn btn-outline-secondary"
      (click)="goToPreviousSection()"
      *ngIf="currentSection > 1"
    >
      <i class="bi bi-arrow-left me-1"></i>
      Sección Anterior
    </button>
    <div *ngIf="currentSection === 1" class="flex-grow-1"></div>

    <button
      type="button"
      class="btn btn-primary"
      (click)="goToNextSection()"
      [disabled]="isSaving"
      *ngIf="currentSection < totalSections"
    >
      Siguiente Sección
      <i class="bi bi-arrow-right ms-1"></i>
    </button>
  </div>

  <!-- Botón final de última sección (sección 6 para multimember) -->
  <div class="section-actions" *ngIf="currentSection === totalSections">
    <button
      type="button"
      class="btn btn-outline-secondary"
      (click)="goToPreviousSection()"
    >
      <i class="bi bi-arrow-left me-1"></i>
      Sección Anterior
    </button>

    <button
      type="button"
      class="btn btn-primary"
      (click)="onLastSectionNext()"
      [disabled]="!isSectionValid() || isSaving"
    >
      <span *ngIf="!isSaving">Siguiente</span>
      <span *ngIf="isSaving">
        <span class="spinner-border spinner-border-sm me-1"></span>Guardando...
      </span>
      <i class="bi bi-arrow-right ms-1" *ngIf="!isSaving"></i>
    </button>
  </div>
</div>
