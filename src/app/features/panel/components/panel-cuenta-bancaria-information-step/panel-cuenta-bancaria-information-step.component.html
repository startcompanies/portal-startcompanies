<div class="panel-cuenta-bancaria-information-step">
  <div class="step-header mb-4">
    <h3 class="step-title">
      <i class="bi bi-bank me-2"></i>
      {{ 'PANEL.panel_form_steps.bank_title' | transloco }}
    </h3>
    <p class="text-muted">
      {{ 'PANEL.panel_form_steps.bank_subtitle' | transloco }}
    </p>
  </div>

  <div class="form-container">
    <app-cuenta-bancaria-form
      [serviceDataForm]="serviceDataForm"
      [usStates]="usStates"
      [fileUploadStates]="fileUploadStates"
      [currentSection]="currentSection"
      (fileSelected)="onFileSelected($event)"
      (fileCleared)="onFileCleared($event)"
      (addOwnerRequested)="onAddOwnerRequested()"
      (removeOwnerRequested)="onRemoveOwnerRequested($event)"
    ></app-cuenta-bancaria-form>
  </div>

  <div class="alert alert-danger mt-3" *ngIf="saveError">
    <i class="bi bi-exclamation-triangle me-2"></i>
    {{ saveError }}
  </div>

  <div class="flow-actions" *ngIf="shouldShowSectionNavigation">
    <button
      type="button"
      class="btn btn-outline-secondary"
      (click)="goToPreviousSection()"
      *ngIf="currentSection > 1"
    >
      <i class="bi bi-arrow-left me-1"></i>
      {{ 'PANEL.flow_nav.previous_section' | transloco }}
    </button>
    <div *ngIf="currentSection === 1" class="flex-grow-1"></div>

    <button
      type="button"
      class="btn btn-primary"
      (click)="goToNextSection()"
      [disabled]="isSaving"
      *ngIf="currentSection < totalSections"
    >
      {{ 'PANEL.flow_nav.next_section' | transloco }}
      <i class="bi bi-arrow-right ms-1"></i>
    </button>
  </div>

  <div class="flow-actions" *ngIf="currentSection === totalSections">
    <button
      type="button"
      class="btn btn-outline-secondary"
      (click)="goToPreviousSection()"
    >
      <i class="bi bi-arrow-left me-1"></i>
      {{ 'PANEL.flow_nav.previous_section' | transloco }}
    </button>

    <button
      type="button"
      class="btn btn-primary"
      (click)="onLastSectionNext()"
      [disabled]="!isSectionValid() || isSaving"
    >
      <span *ngIf="!isSaving">{{ 'PANEL.flow_nav.next' | transloco }}</span>
      <span *ngIf="isSaving">
        <span class="spinner-border spinner-border-sm me-1"></span>{{ 'PANEL.panel_form_steps.saving' | transloco }}
      </span>
      <i class="bi bi-arrow-right ms-1" *ngIf="!isSaving"></i>
    </button>
  </div>
</div>
