<div class="client-association-step">
  <h3>Asociación de Cliente</h3>
  <p class="text-muted">Confirma o actualiza tu información de cliente</p>
  
  <form [formGroup]="form">
    <div class="row g-3">
      <div class="col-md-6">
        <label for="clientFirstName" class="form-label">Nombre <span class="text-danger">*</span></label>
        <input
          type="text"
          id="clientFirstName"
          class="form-control"
          formControlName="clientFirstName"
          [class.is-invalid]="clientFirstName?.invalid && clientFirstName?.touched"
          placeholder="Juan"
        />
        <div class="invalid-feedback" *ngIf="clientFirstName?.invalid && clientFirstName?.touched">
          El nombre es requerido
        </div>
      </div>
      
      <div class="col-md-6">
        <label for="clientLastName" class="form-label">Apellido <span class="text-danger">*</span></label>
        <input
          type="text"
          id="clientLastName"
          class="form-control"
          formControlName="clientLastName"
          [class.is-invalid]="clientLastName?.invalid && clientLastName?.touched"
          placeholder="Pérez"
        />
        <div class="invalid-feedback" *ngIf="clientLastName?.invalid && clientLastName?.touched">
          El apellido es requerido
        </div>
      </div>
      
      <div class="col-md-6">
        <label for="clientEmail" class="form-label">Correo Electrónico <span class="text-danger">*</span></label>
        <input
          type="email"
          id="clientEmail"
          class="form-control"
          formControlName="clientEmail"
          [class.is-invalid]="clientEmail?.invalid && clientEmail?.touched"
          placeholder="cliente@example.com"
        />
        <div class="invalid-feedback" *ngIf="clientEmail?.invalid && clientEmail?.touched">
          <span *ngIf="clientEmail?.errors?.['required']">El correo es requerido</span>
          <span *ngIf="clientEmail?.errors?.['email']">Ingresa un correo válido</span>
        </div>
      </div>
      
      <div class="col-md-6">
        <label for="clientPhone" class="form-label">Teléfono</label>
        <app-intl-tel-input
          id="clientPhone"
          formControlName="clientPhone"
          placeholder="Teléfono"
          [initialCountry]="detectedCountryCode"
        ></app-intl-tel-input>
      </div>
    </div>
    
    <div *ngIf="errorMessage" class="alert alert-danger mt-3">
      <i class="bi bi-exclamation-triangle me-2"></i>
      {{ errorMessage }}
    </div>
  </form>
</div>
