<div class="lili-panel-shell">
  <div *ngIf="loading" class="lili-panel-loading-overlay" role="status" aria-live="polite">
    <div class="lili-panel-loading-inner">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">{{ 'PANEL.lili_request_page.loading' | transloco }}</span>
      </div>
      <p class="mt-3 text-muted mb-0">{{ 'PANEL.lili_request_page.loading' | transloco }}</p>
    </div>
  </div>

  <div *ngIf="missingEmail && !loading" class="lili-panel-state lili-panel-state-error">
    <p>{{ 'PANEL.lili_request_page.missing_email' | transloco }}</p>
  </div>

  <div *ngIf="error" class="lili-panel-state lili-panel-state-error">
    <p>{{ 'PANEL.lili_request_page.error' | transloco }}</p>
  </div>

  <div
    id="lili-panel-embed"
    class="lili-panel-embed"
    [class.lili-panel-embed-hidden]="error || missingEmail"
  ></div>
</div>
