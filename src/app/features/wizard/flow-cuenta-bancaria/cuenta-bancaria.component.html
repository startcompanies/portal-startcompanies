<app-wizard-base *ngIf="flowConfig" [totalSteps]="flowConfig.totalSteps" [currentStepIndex]="currentStepIndex"
  [stepTitles]="stepTitles" [stepIcons]="stepIcons" [steps]="flowConfig.steps" (stepChanged)="onStepChanged($event)"
  (finish)="onFinish()" (cancel)="onCancel()" [flowType]="'cuenta-bancaria'">
  <mat-stepper #stepper [linear]="false" (selectionChange)="onStepChanged($event.selectedIndex)" class="custom-stepper">
    <!-- Paso 1: Registro Básico (siempre presente) -->
    <mat-step [label]="stepTitles[1] || ('WIZARD.steps.register' | transloco)">
      <app-wizard-basic-register-step [stepNumber]="1"></app-wizard-basic-register-step>
    </mat-step>

    <!-- Paso 2: Pago (solo si withPayment = true) -->
    <mat-step *ngIf="withPayment" [label]="stepTitles[2] || ('WIZARD.steps.payment' | transloco)">
      <app-wizard-payment-step [stepNumber]="2" [previousStepNumber]="1"></app-wizard-payment-step>
    </mat-step>

    <!-- Paso de Información (varía según el flujo) -->
    <mat-step [label]="stepTitles[withPayment ? 3 : 2] || ('WIZARD.steps.client' | transloco)">
      <app-client-form-cuenta [stepNumber]="withPayment ? 3 : 2"></app-client-form-cuenta>
    </mat-step>

    <!-- Paso de Revisión -->
    <mat-step [label]="stepTitles[withPayment ? 4 : 3] || ('WIZARD.steps.review' | transloco)">
      <app-wizard-final-review-step [stepNumber]="withPayment ? 4 : 3"
        [previousSteps]="withPayment ? [1, 2, 3] : [1, 2]"></app-wizard-final-review-step>
    </mat-step>
  </mat-stepper>
</app-wizard-base>
