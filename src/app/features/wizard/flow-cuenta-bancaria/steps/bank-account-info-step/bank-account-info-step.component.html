<div class="client-form-cuenta">
    <h4 class="mb-3">
        {{ 'WIZARD.bankAccount.title' | transloco }}
    </h4>

    <form [formGroup]="form">

        <!-- Banco -->
        <div class="form-group mb-3">
            <label for="bankName">
                {{ 'WIZARD.bankAccount.bank_name' | transloco }}
            </label>
            <select id="bankName" class="form-control" formControlName="bankName">
                <option value="">{{ 'COMMON.select_option' | transloco }}</option>
                <option value="boa">Bank of America</option>
                <option value="chase">Chase</option>
                <option value="wells">Wells Fargo</option>
                <option value="citi">Citibank</option>
            </select>
            <div *ngIf="form.get('bankName')?.touched && form.get('bankName')?.invalid" class="text-danger mt-1">
                {{ 'WIZARD.bankAccount.bank_name_required' | transloco }}
            </div>
        </div>

        <!-- SWIFT / BIC / ABA -->
        <div class="form-group mb-3">
            <label for="swiftBicAba">
                {{ 'WIZARD.bankAccount.swift' | transloco }}
            </label>
            <input id="swiftBicAba" class="form-control" formControlName="swiftBicAba" />
        </div>

        <!-- Número de cuenta -->
        <div class="form-group mb-3">
            <label for="accountNumber">
                {{ 'WIZARD.bankAccount.account_number' | transloco }}
            </label>
            <input id="accountNumber" class="form-control" formControlName="accountNumber" />
        </div>

        <!-- Tipo de cuenta -->
        <div class="form-group mb-3">
            <label for="bankAccountType">
                {{ 'WIZARD.bankAccount.account_type' | transloco }}
            </label>
            <select id="bankAccountType" class="form-control" formControlName="bankAccountType">
                <option value="">{{ 'COMMON.select_option' | transloco }}</option>
                <option value="checking">Cuenta Corriente</option>
                <option value="savings">Cuenta de Ahorros</option>
                <option value="business">Cuenta Empresarial</option>
            </select>
        </div>

        <!-- Fecha de registro -->
        <div class="form-group mb-3">
            <label for="firstRegistrationDate">
                {{ 'WIZARD.bankAccount.first_registration_date' | transloco }}
            </label>
            <input id="firstRegistrationDate" type="date" class="form-control"
                formControlName="firstRegistrationDate" />
        </div>

        <!-- Litigios -->
        <div class="form-group mb-3">
            <label>
                {{ 'WIZARD.bankAccount.has_litigated' | transloco }}
            </label>
            <select class="form-control" formControlName="hasLitigatedCurrentFiscalYear">
                <option [ngValue]="true">{{ 'COMMON.yes' | transloco }}</option>
                <option [ngValue]="false">{{ 'COMMON.no' | transloco }}</option>
            </select>
        </div>

        <!-- Detalles de litigio -->
        <div class="form-group mb-3" *ngIf="form.get('hasLitigatedCurrentFiscalYear')?.value === true">
            <label for="litigationDetails">
                {{ 'WIZARD.bankAccount.litigation_details' | transloco }}
            </label>
            <textarea id="litigationDetails" class="form-control" rows="4"
                formControlName="litigationDetails"></textarea>

            <div *ngIf="form.get('litigationDetails')?.touched && form.get('litigationDetails')?.invalid"
                class="text-danger mt-1">
                {{ 'WIZARD.bankAccount.litigation_details_required' | transloco }}
            </div>
        </div>

    </form>
</div>
