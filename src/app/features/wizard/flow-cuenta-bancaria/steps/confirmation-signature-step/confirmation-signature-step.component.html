<div class="client-form-cuenta">
    <h4 class="mb-3">
        {{ 'WIZARD.confirmation.title' | transloco }}
    </h4>

    <form [formGroup]="form">

        <!-- Certificación -->
        <div class="form-group mb-3">
            <label>
                {{ 'WIZARD.confirmation.certification' | transloco }}
            </label>
            <textarea rows="5" class="form-control" formControlName="documentCertification"></textarea>
        </div>

        <!-- Términos -->
        <div class="form-group mb-4">
            <label class="checkbox-label">
                <input type="checkbox" formControlName="acceptsTermsAndConditions" />
                {{ 'WIZARD.confirmation.accept_terms' | transloco }}
            </label>
            <div *ngIf="
            form.get('acceptsTermsAndConditions')?.touched &&
            form.get('acceptsTermsAndConditions')?.invalid
          " class="text-danger">
                {{ 'WIZARD.confirmation.accept_terms_required' | transloco }}
            </div>
        </div>

        <!-- Subformulario: Miembro Validador -->
        <div formGroupName="bankAccountValidator" class="validator-card">

            <h5 class="mb-3">
                {{ 'WIZARD.validator.title' | transloco }}
            </h5>

            <div class="form-group mb-3">
                <label>{{ 'COMMON.first_name' | transloco }}</label>
                <input class="form-control" formControlName="firstName" />
            </div>

            <div class="form-group mb-3">
                <label>{{ 'COMMON.last_name' | transloco }}</label>
                <input class="form-control" formControlName="lastName" />
            </div>

            <div class="form-group mb-3">
                <label>{{ 'COMMON.birth_date' | transloco }}</label>
                <input type="date" class="form-control" formControlName="dateOfBirth" />
            </div>

            <div class="form-group mb-3">
                <label>{{ 'COMMON.nationality' | transloco }}</label>
                <select class="form-control" formControlName="nationality">
                    <option value="">{{ 'COMMON.select_option' | transloco }}</option>
                    <option value="mx">México</option>
                    <option value="us">Estados Unidos</option>
                    <option value="other">Otro</option>
                </select>
            </div>

            <div class="form-group mb-3">
                <label>{{ 'COMMON.citizenship' | transloco }}</label>
                <select class="form-control" formControlName="citizenship">
                    <option value="">{{ 'COMMON.select_option' | transloco }}</option>
                    <option value="mx">México</option>
                    <option value="us">Estados Unidos</option>
                    <option value="other">Otro</option>
                </select>
            </div>

            <div class="form-group mb-3">
                <label>{{ 'WIZARD.validator.passport_number' | transloco }}</label>
                <input class="form-control" formControlName="passportNumber" />
            </div>

            <div class="form-group mb-3">
                <label>{{ 'WIZARD.validator.passport_file' | transloco }}</label>
                <input type="file" class="form-control" accept="application/pdf,image/jpeg,image/png"
                    (change)="onPassportFileChange($event)" />
            </div>

            <div class="form-group mb-3">
                <label>{{ 'COMMON.email' | transloco }}</label>
                <input type="email" class="form-control" formControlName="workEmail" />
            </div>

            <div class="form-group mb-3">
                <label class="checkbox-label">
                    <input type="checkbox" formControlName="useEmailForRelayLogin" />
                    {{ 'WIZARD.validator.use_email_login' | transloco }}
                </label>
            </div>

            <div class="form-group mb-3">
                <label>{{ 'COMMON.phone' | transloco }}</label>
                <input class="form-control" formControlName="phone" />
            </div>

            <div class="form-group mb-3">
                <label class="checkbox-label">
                    <input type="checkbox" formControlName="canReceiveSMS" />
                    {{ 'WIZARD.validator.can_receive_sms' | transloco }}
                </label>
            </div>

            <div class="form-group mb-3">
                <label>{{ 'WIZARD.validator.us_resident' | transloco }}</label>
                <select class="form-control" formControlName="isUSResident">
                    <option [ngValue]="true">Sí</option>
                    <option [ngValue]="false">No</option>
                </select>
            </div>

        </div>
    </form>
</div>
