<div class="client-form-cuenta">
    <h4 class="mb-3">
        {{ 'WIZARD.applicant.title' | transloco }}
    </h4>

    <form [formGroup]="form">

        <!-- Email -->
        <div class="form-group mb-3">
            <label for="applicantEmail">
                {{ 'WIZARD.applicant.email' | transloco }}
            </label>
            <input id="applicantEmail" type="email" class="form-control" formControlName="applicantEmail"
                [placeholder]="'WIZARD.applicant.email_placeholder' | transloco" />
            <div *ngIf="form.get('applicantEmail')?.touched && form.get('applicantEmail')?.invalid"
                class="text-danger mt-1">
                {{ 'WIZARD.applicant.email_invalid' | transloco }}
            </div>
        </div>

        <!-- Nombre(s) -->
        <div class="form-group mb-3">
            <label for="applicantFirstName">
                {{ 'WIZARD.applicant.first_name' | transloco }}
            </label>
            <input id="applicantFirstName" class="form-control" formControlName="applicantFirstName" />
            <div *ngIf="form.get('applicantFirstName')?.touched && form.get('applicantFirstName')?.invalid"
                class="text-danger mt-1">
                {{ 'WIZARD.applicant.first_name_required' | transloco }}
            </div>
        </div>

        <!-- Apellido Paterno -->
        <div class="form-group mb-3">
            <label for="applicantPaternalLastName">
                {{ 'WIZARD.applicant.paternal_last_name' | transloco }}
            </label>
            <input id="applicantPaternalLastName" class="form-control" formControlName="applicantPaternalLastName" />
        </div>

        <!-- Apellido Materno -->
        <div class="form-group mb-3">
            <label for="applicantMaternalLastName">
                {{ 'WIZARD.applicant.maternal_last_name' | transloco }}
            </label>
            <input id="applicantMaternalLastName" class="form-control" formControlName="applicantMaternalLastName" />
        </div>

        <!-- Teléfono -->
        <div class="form-group mb-3">
            <label for="applicantPhone">
                {{ 'WIZARD.applicant.phone' | transloco }}
            </label>
            <input id="applicantPhone" class="form-control" formControlName="applicantPhone" />
        </div>

        <!-- Tipo de cuenta -->
        <div class="form-group mb-3">
            <label for="accountType">
                {{ 'WIZARD.applicant.account_type' | transloco }}
            </label>
            <select id="accountType" class="form-control" formControlName="accountType">
                <option value="">{{ 'COMMON.select_option' | transloco }}</option>
                <option value="personal">Personal</option>
                <option value="business">Empresarial</option>
            </select>
            <div *ngIf="form.get('accountType')?.touched && form.get('accountType')?.invalid" class="text-danger mt-1">
                {{ 'WIZARD.applicant.account_type_required' | transloco }}
            </div>
        </div>

        <!-- Tipo de negocio -->
        <div class="form-group mb-3">
            <label for="businessType">
                {{ 'WIZARD.applicant.business_type' | transloco }}
            </label>
            <select id="businessType" class="form-control" formControlName="businessType">
                <option value="">{{ 'COMMON.select_option' | transloco }}</option>
                <option value="llc">LLC</option>
                <option value="corp">Corporation</option>
                <option value="sole">Sole Proprietor</option>
            </select>
        </div>

        <!-- Identificador legal -->
        <div class="form-group mb-3">
            <label for="legalBusinessIdentifier">
                {{ 'WIZARD.applicant.legal_identifier' | transloco }}
            </label>
            <input id="legalBusinessIdentifier" class="form-control" formControlName="legalBusinessIdentifier" />
        </div>

        <!-- Industria -->
        <div class="form-group mb-3">
            <label for="industry">
                {{ 'WIZARD.applicant.industry' | transloco }}
            </label>
            <select id="industry" class="form-control" formControlName="industry">
                <option value="">{{ 'COMMON.select_option' | transloco }}</option>
                <option value="technology">Tecnología</option>
                <option value="commerce">Comercio</option>
                <option value="services">Servicios</option>
            </select>
        </div>

        <!-- Actividad económica -->
        <div class="form-group mb-3">
            <label for="economicActivity">
                {{ 'WIZARD.applicant.economic_activity' | transloco }}
            </label>
            <textarea id="economicActivity" class="form-control" rows="3" maxlength="200"
                formControlName="economicActivity"></textarea>
        </div>

        <!-- EIN -->
        <div class="form-group mb-3">
            <label for="ein">
                {{ 'WIZARD.applicant.ein' | transloco }}
            </label>
            <input id="ein" class="form-control" placeholder="12-3456789" formControlName="ein" />
            <div *ngIf="form.get('ein')?.touched && form.get('ein')?.invalid" class="text-danger mt-1">
                {{ 'WIZARD.applicant.ein_invalid' | transloco }}
            </div>
        </div>

        <!-- Certificado -->
        <div class="form-group mb-3">
            <label>
                {{ 'WIZARD.applicant.certificate' | transloco }}
            </label>
            <input type="file" class="form-control" accept="application/pdf"
                (change)="onFileChange($event, 'certificateOfConstitutionOrArticles')" />
        </div>

        <!-- Operating Agreement -->
        <div class="form-group mb-3">
            <label>
                {{ 'WIZARD.applicant.operating_agreement' | transloco }}
            </label>
            <input type="file" class="form-control" accept="application/pdf"
                (change)="onFileChange($event, 'operatingAgreement')" />
        </div>

    </form>
</div>
