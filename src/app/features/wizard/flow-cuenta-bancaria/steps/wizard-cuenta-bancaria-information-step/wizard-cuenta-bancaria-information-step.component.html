<div class="wizard-cuenta-bancaria-information-step">
  <!-- Usar el componente wizard-cuenta-bancaria-form -->
  <div class="form-container">
    <app-wizard-cuenta-bancaria-form
      [serviceDataForm]="serviceDataForm"
      [usStates]="usStates"
      [fileUploadStates]="fileUploadStates"
      [currentSection]="currentSection"
      (fileSelected)="onFileSelected($event)"
      (fileCleared)="onFileCleared($event)"
      (addOwnerRequested)="onAddOwnerRequested()"
      (removeOwnerRequested)="onRemoveOwnerRequested($event)"
    ></app-wizard-cuenta-bancaria-form>
  </div>
  
  <!-- Navegación entre secciones del formulario -->
  <div class="d-flex justify-content-between align-items-center mt-4 pt-3 border-top" *ngIf="shouldShowSectionNavigation">
    <button 
      type="button" 
      class="btn btn-outline-secondary"
      (click)="goToPreviousSection()"
      [disabled]="currentSection === 1"
      *ngIf="currentSection > 1"
    >
      <i class="bi bi-arrow-left me-1"></i>
      Sección Anterior
    </button>
    <div *ngIf="currentSection === 1" class="flex-grow-1"></div>
    
    <button 
      type="button" 
      class="btn btn-primary"
      (click)="goToNextSection()"
      [disabled]="currentSection >= totalSections"
      *ngIf="currentSection < totalSections"
    >
      Siguiente Sección
      <i class="bi bi-arrow-right ms-1"></i>
    </button>
  </div>
</div>
