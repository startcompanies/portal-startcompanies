<div class="client-form-cuenta">
    <h4 class="mb-3">
        {{ 'WIZARD.bank_account.owners.title' | transloco }}
    </h4>

    <form [formGroup]="form">

        <div formArrayName="owners">

            <div class="owner-card" *ngFor="let owner of owners.controls; let i = index" [formGroupName]="i">

                <h5 class="mb-3">
                    {{ 'WIZARD.bank_account.owners.owner' | transloco }} {{ i + 1 }}
                </h5>

                <div class="form-group mb-3">
                    <label>{{ 'WIZARD.bank_account.owners.first_name' | transloco }}</label>
                    <input class="form-control" formControlName="firstName" [placeholder]="'WIZARD.bank_account.owners.first_name_placeholder' | transloco" />
                </div>

                <div class="form-group mb-3">
                    <label>{{ 'WIZARD.bank_account.owners.paternal_last_name' | transloco }}</label>
                    <input class="form-control" formControlName="paternalLastName" [placeholder]="'WIZARD.bank_account.owners.paternal_last_name_placeholder' | transloco" />
                </div>

                <div class="form-group mb-3">
                    <label>{{ 'WIZARD.bank_account.owners.maternal_last_name' | transloco }}</label>
                    <input class="form-control" formControlName="maternalLastName" [placeholder]="'WIZARD.bank_account.owners.maternal_last_name_placeholder' | transloco" />
                </div>

                <div class="form-group mb-3">
                    <label>{{ 'WIZARD.bank_account.owners.birth_date' | transloco }}</label>
                    <input type="date" class="form-control" formControlName="dateOfBirth" />
                </div>

                <div class="form-group mb-3">
                    <label>{{ 'WIZARD.bank_account.owners.nationality' | transloco }}</label>
                    <select class="form-control" formControlName="nationality">
                        <option value="">{{ 'COMMON.select_option' | transloco }}</option>
                        <option value="mx">México</option>
                        <option value="us">Estados Unidos</option>
                        <option value="other">Otro</option>
                    </select>
                </div>

                <div class="form-group mb-3">
                    <label>{{ 'WIZARD.bank_account.owners.document_number' | transloco }}</label>
                    <input class="form-control" formControlName="passportOrNationalId" [placeholder]="'WIZARD.bank_account.owners.document_number_placeholder' | transloco" />
                </div>

                <div class="form-group mb-3">
                    <label>{{ 'WIZARD.bank_account.owners.identity_document' | transloco }}</label>
                    <input type="file" class="form-control" multiple accept="application/pdf,image/jpeg,image/png"
                        (change)="onIdentityFilesChange($event, i)" />
                </div>

                <div class="form-group mb-3">
                    <label>{{ 'WIZARD.bank_account.owners.facial_photo' | transloco }}</label>
                    <input type="file" class="form-control" accept="image/jpeg,image/png"
                        (change)="onFacialPhotoChange($event, i)" />
                </div>

                <button type="button" class="btn btn-link text-danger" *ngIf="owners.length > 1"
                    (click)="removeOwner(i)">
                    {{ 'COMMON.remove' | transloco }}
                </button>

                <hr />
            </div>
        </div>

        <button type="button" class="btn btn-outline-primary mt-3" (click)="addOwner()">
            {{ 'WIZARD.bank_account.owners.add_owner' | transloco }}
        </button>

    </form>
</div>
