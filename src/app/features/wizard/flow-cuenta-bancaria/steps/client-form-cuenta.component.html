<div class="client-form-cuenta">
  <h4 class="mb-3">{{ 'WIZARD.client.title' | transloco }}</h4>

  <form [formGroup]="form">
    <div class="form-group mb-3">
      <label for="fullName">{{ 'WIZARD.client.full_name' | transloco }}</label>
      <input
        id="fullName"
        class="form-control"
        formControlName="fullName"
        [placeholder]="'WIZARD.client.full_name_placeholder' | transloco"
      />
      <div
        *ngIf="form.get('fullName')?.touched && form.get('fullName')?.invalid"
        class="text-danger mt-1"
      >
        {{ 'WIZARD.client.full_name_required' | transloco }}
      </div>
    </div>

    <div class="form-group mb-3">
      <label for="phone">{{ 'WIZARD.client.phone' | transloco }}</label>
      <input
        id="phone"
        class="form-control"
        formControlName="phone"
        [placeholder]="'WIZARD.client.phone_placeholder' | transloco"
      />
      <div
        *ngIf="form.get('phone')?.touched && form.get('phone')?.invalid"
        class="text-danger mt-1"
      >
        {{ 'WIZARD.client.phone_required' | transloco }}
      </div>
    </div>

    <div class="form-group mb-3">
      <label for="address">{{ 'WIZARD.client.address' | transloco }}</label>
      <input
        id="address"
        class="form-control"
        formControlName="address"
        [placeholder]="'WIZARD.client.address_placeholder' | transloco"
      />
      <div
        *ngIf="form.get('address')?.touched && form.get('address')?.invalid"
        class="text-danger mt-1"
      >
        {{ 'WIZARD.client.address_required' | transloco }}
      </div>
    </div>

    <!-- Campos específicos de cuenta bancaria -->
    <div class="form-group mb-3">
      <label for="accountType">Tipo de Cuenta</label>
      <select id="accountType" class="form-control" formControlName="accountType">
        <option value="">Seleccione un tipo</option>
        <option value="checking">Cuenta Corriente</option>
        <option value="savings">Cuenta de Ahorros</option>
        <option value="business">Cuenta Empresarial</option>
      </select>
      <div
        *ngIf="form.get('accountType')?.touched && form.get('accountType')?.invalid"
        class="text-danger mt-1"
      >
        El tipo de cuenta es requerido
      </div>
    </div>

    <div class="form-group mb-3">
      <label for="bankName">Nombre del Banco</label>
      <input
        id="bankName"
        class="form-control"
        formControlName="bankName"
        placeholder="Nombre de la institución bancaria"
      />
      <div
        *ngIf="form.get('bankName')?.touched && form.get('bankName')?.invalid"
        class="text-danger mt-1"
      >
        El nombre del banco es requerido
      </div>
    </div>

    <div class="form-group mb-3">
      <label for="taxId">Tax ID / EIN</label>
      <input
        id="taxId"
        class="form-control"
        formControlName="taxId"
        placeholder="Número de identificación fiscal"
      />
      <div
        *ngIf="form.get('taxId')?.touched && form.get('taxId')?.invalid"
        class="text-danger mt-1"
      >
        El Tax ID es requerido
      </div>
    </div>
  </form>
</div>
