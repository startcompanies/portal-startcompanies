<div class="client-form-cuenta">
    <h4 class="mb-3">
        {{ 'WIZARD.bank_account.companyAddress.title' | transloco }}
    </h4>

    <form [formGroup]="form">

        <!-- Calle y número -->
        <div class="form-group mb-3">
            <label for="street">
                {{ 'WIZARD.bank_account.companyAddress.street' | transloco }}
            </label>
            <input id="street" class="form-control" formControlName="street" formGroupName="companyAddress" />
            <div *ngIf="form.get('companyAddress.street')?.touched && form.get('companyAddress.street')?.invalid"
                class="text-danger mt-1">
                {{ 'WIZARD.bank_account.companyAddress.street_required' | transloco }}
            </div>
        </div>

        <!-- Unidad -->
        <div class="form-group mb-3">
            <label for="unit">
                {{ 'WIZARD.bank_account.companyAddress.unit' | transloco }}
            </label>
            <input id="unit" class="form-control" formControlName="unit" formGroupName="companyAddress" />
        </div>

        <!-- Ciudad -->
        <div class="form-group mb-3">
            <label for="city">
                {{ 'WIZARD.bank_account.companyAddress.city' | transloco }}
            </label>
            <input id="city" class="form-control" formControlName="city" formGroupName="companyAddress" />
        </div>

        <!-- Estado -->
        <div class="form-group mb-3">
            <label for="state">
                {{ 'WIZARD.bank_account.companyAddress.state' | transloco }}
            </label>
            <select id="state" class="form-control" formControlName="state" formGroupName="companyAddress">
                <option value="">{{ 'COMMON.select_option' | transloco }}</option>
                <option value="CA">California</option>
                <option value="TX">Texas</option>
                <option value="FL">Florida</option>
                <option value="NY">New York</option>
            </select>
        </div>

        <!-- Código postal -->
        <div class="form-group mb-3">
            <label for="postalCode">
                {{ 'WIZARD.bank_account.companyAddress.postal_code' | transloco }}
            </label>
            <input id="postalCode" class="form-control" formControlName="postalCode" formGroupName="companyAddress" />
        </div>

        <!-- País -->
        <div class="form-group mb-3">
            <label for="country">
                {{ 'WIZARD.bank_account.companyAddress.country' | transloco }}
            </label>
            <input id="country" class="form-control" formControlName="country" formGroupName="companyAddress"
                [disabled]="true" />
        </div>

        <!-- Registered Agent -->
        <div class="form-group mb-3">
            <label>
                {{ 'WIZARD.bank_account.companyAddress.is_registered_agent' | transloco }}
            </label>
            <select class="form-control" formControlName="isRegisteredAgentInUSA">
                <option [ngValue]="true">
                    {{ 'COMMON.yes' | transloco }}
                </option>
                <option [ngValue]="false">
                    {{ 'COMMON.no' | transloco }}
                </option>
            </select>
        </div>

        <!-- Nombre Registered Agent -->
        <div class="form-group mb-3">
            <label for="registeredAgentName">
                {{ 'WIZARD.bank_account.companyAddress.agent_name' | transloco }}
            </label>
            <input id="registeredAgentName" class="form-control" formControlName="registeredAgentName" />
        </div>

        <!-- Dirección Registered Agent -->
        <div class="form-group mb-3">
            <label for="registeredAgentAddress">
                {{ 'WIZARD.bank_account.companyAddress.agent_address' | transloco }}
            </label>
            <textarea id="registeredAgentAddress" class="form-control" rows="4"
                formControlName="registeredAgentAddress"></textarea>
        </div>

    </form>
</div>
