<div class="wizard-renovacion-llc-information-step">
  <!-- Mostrar el estado seleccionado -->
  <div class="alert alert-info mb-4" *ngIf="serviceDataForm.get('state')?.value">
    <i class="bi bi-geo-alt me-2"></i>
    <strong>Estado:</strong> {{ serviceDataForm.get('state')?.value }}
  </div>
  
  <!-- Usar el componente wizard-renovacion-llc-form -->
  <div class="llc-form-container">
    <app-renovacion-llc-form
      [serviceDataForm]="serviceDataForm"
      [usStates]="usStates"
      [llcTypes]="llcTypes"
      [fileUploadStates]="fileUploadStates"
      [currentSection]="currentSection"
      (fileSelected)="onFileSelected($event)"
      (fileCleared)="onFileCleared($event)"
      (addOwnerRequested)="onAddOwnerRequested()"
      (removeOwnerRequested)="onRemoveOwnerRequested($event)"
    ></app-renovacion-llc-form>
  </div>
  
  <!-- Barra de acciones con posición consistente -->
  <div class="flow-actions">
    <button 
      type="button" 
      class="btn btn-outline-secondary"
      (click)="goToPreviousSection()"
      [disabled]="currentSection === 1"
      *ngIf="currentSection > 1"
    >
      <i class="bi bi-arrow-left me-1"></i>
      {{ 'WIZARD.llc_info_step.section_prev' | transloco }}
    </button>
    <div *ngIf="currentSection === 1" class="flex-grow-1"></div>
    
    <button 
      type="button" 
      class="btn btn-primary"
      (click)="goToNextSection()"
      [disabled]="currentSection >= totalSections"
      *ngIf="currentSection < totalSections"
    >
      {{ 'WIZARD.llc_info_step.section_next' | transloco }}
      <i class="bi bi-arrow-right ms-1"></i>
    </button>
    <button 
      type="button" 
      class="btn btn-primary"
      (click)="onLastSectionNext()"
      [disabled]="!isSectionValid() || isSaving"
      *ngIf="currentSection === totalSections"
    >
      <span *ngIf="!isSaving">{{ 'WIZARD.next' | transloco }}</span>
      <span *ngIf="isSaving"><span class="spinner-border spinner-border-sm me-1"></span>{{ 'WIZARD.llc_info_step.saving' | transloco }}</span>
      <i class="bi bi-arrow-right ms-1" *ngIf="!isSaving"></i>
    </button>
  </div>
</div>
