<div class="wizard-section">
  <!-- Fondo hero -->
  <app-responsive-image [images]="heroImages" context="hero" loading="eager"
    cssClass="sc-hero-bg"></app-responsive-image>

  <!-- Contenedor principal -->
  <div class="wizard-layout">
    <!-- Columna izquierda (fondo azul) -->
    <div class="wizard-left"></div>

    <!-- Columna derecha (panel blanco que cubre toda la altura) -->
    <div class="wizard-right">
      <div class="wizard-inner">
        <!-- Indicador de progreso personalizado - Estilo moderno -->
        <div class="wizard-progress-indicator">
          <div class="wizard-progress-header">
            <div class="wizard-progress-text">
              Paso {{ internalStepIndex + 1 }}/{{ totalSteps }} - {{ stepTitles[internalStepIndex + 1] ||
              ('WIZARD.steps.step' + (internalStepIndex + 1) | transloco) }}
            </div>
          </div>
          <div class="wizard-progress-steps">
            <div *ngFor="let step of steps; let i = index" class="wizard-progress-step" [ngClass]="getStepClass(i)">
              <div class="wizard-progress-step-icon">
                <i [class]="'bi ' + stepIcons[step.stepNumber || (i + 1)]"></i>
              </div>
              <div class="wizard-progress-step-label">
                {{ stepTitles[step.stepNumber || (i + 1)] || (step.translationKey | transloco) }}
              </div>
            </div>
          </div>
        </div>

        <div class="wizard-step-content">
          <ng-content></ng-content>
        </div>

        <!-- Botones de navegación personalizados -->
        <div class="wizard-custom-navigation">
          <button mat-stroked-button type="button" class="wizard-nav-button wizard-nav-button-previous"
            [disabled]="internalStepIndex === 0" (click)="goToPreviousStep()">
            <i [class]="'bi bi-arrow-left'"></i>
            {{ 'WIZARD.previous' | transloco }}
          </button>
          <button *ngIf="showNextButton" mat-raised-button id="nextButton" type="button"
            class="wizard-nav-button wizard-nav-button-next" [disabled]="internalStepIndex === totalSteps - 1"
            (click)="goToNextStep()">
            {{ 'WIZARD.next' | transloco }}
            <i [class]="'bi bi-arrow-right'"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
