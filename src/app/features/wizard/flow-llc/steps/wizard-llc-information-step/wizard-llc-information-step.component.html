<div class="wizard-llc-information-step">
  <div class="mb-4">
    <h4 class="mb-2">
      <i class="bi bi-building me-2"></i>
      {{ 'WIZARD.steps.llc_info' | transloco }}
    </h4>
    <p class="text-muted">
      Completa la información de tu LLC. El estado de incorporación será el seleccionado en el paso anterior.
    </p>
  </div>
  
  <!-- Usar el componente wizard-apertura-llc-form -->
  <div class="llc-form-container">
    <app-apertura-llc-form
      [serviceDataForm]="serviceDataForm"
      [usStates]="usStates"
      [fileUploadStates]="fileUploadStates"
      [currentSection]="currentSection"
      [forceSingleMember]="forceSingleMember"
      (fileSelected)="onFileSelected($event)"
      (memberFileSelected)="onMemberFileSelected($event)"
      (fileCleared)="onFileCleared($event)"
      (memberFileCleared)="onMemberFileCleared($event)"
      (llcTypeChanged)="onLlcTypeChanged($event)"
      (addMemberRequested)="addMember()"
      (removeMemberRequested)="removeMember($event)"
    ></app-apertura-llc-form>
  </div>
  
  <!-- Barra de acciones fija (misma posición visual que flow-actions del base) -->
  <div class="service-form-actions d-flex justify-content-between align-items-center mt-4 pt-3 border-top">
    <button 
      type="button" 
      class="btn btn-outline-secondary"
      (click)="goToPreviousSection()"
      [disabled]="currentSection === 1"
      *ngIf="currentSection > 1"
    >
      <i class="bi bi-arrow-left me-1"></i>
      Sección Anterior
    </button>
    <div *ngIf="currentSection === 1" class="flex-grow-1"></div>
    
    <button 
      type="button" 
      class="btn btn-primary"
      (click)="goToNextSection()"
      [disabled]="currentSection >= 3"
      *ngIf="currentSection < 3"
    >
      Siguiente Sección
      <i class="bi bi-arrow-right ms-1"></i>
    </button>
    <button 
      type="button" 
      class="btn btn-primary"
      (click)="onLastSectionNext()"
      [disabled]="!isSectionValid() || isSaving"
      *ngIf="currentSection === 3"
    >
      <span *ngIf="!isSaving">Siguiente</span>
      <span *ngIf="isSaving"><span class="spinner-border spinner-border-sm me-1"></span>Guardando...</span>
      <i class="bi bi-arrow-right ms-1" *ngIf="!isSaving"></i>
    </button>
  </div>
</div>
