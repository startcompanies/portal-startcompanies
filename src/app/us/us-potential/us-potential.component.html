<div class="potential-container h-100">
  <div class="potential-content">
    <h1 class="potential-title">
      <span class="title-main">{{'US.potential.title' | transloco}}</span>
      <span class="title-accent">{{'US.potential.title2' | transloco}}</span>
    </h1>
    <p class="potential-subtitle">
      {{'US.potential.description' | transloco}}
    </p>
    <div class="cta-buttons">
      <button class="cta-button primary">
        {{'US.potential.cta-primary' | transloco}}
        <span class="arrow">→</span>
      </button>
      <button class="cta-button secondary">
        {{'US.potential.cta-secondary' | transloco}}
        <span class="arrow">→</span>
      </button>
    </div>
  </div>
</div>
