<!-- SEO Base Component -->
<app-seo-base routeKey="nosotros"></app-seo-base>

<app-sc-header></app-sc-header>
<section class="mb-5 py-5 sc-hero" #heroSection>
  <app-responsive-image
    [images]="heroImages"
    context="hero"
    loading="eager"
    cssClass="sc-hero-bg"
  >
  </app-responsive-image>

  <div
    id="carouselExampleIndicators"
    class="carousel slide"
    data-bs-ride="carousel"
  >
    <div class="carousel-indicators">
      <button
        type="button"
        data-bs-target="#carouselExampleIndicators"
        data-bs-slide-to="0"
        class="active"
        aria-current="true"
        aria-label="Slide 1"
      ></button>
      <button
        type="button"
        data-bs-target="#carouselExampleIndicators"
        data-bs-slide-to="1"
        aria-label="Slide 2"
      ></button>
    </div>

    <div class="carousel-inner">
      <div class="carousel-item active">
        <div class="container">
          <div class="mission-card row align-items-center my-5 g-5 py-5">
            <div class="col-lg-6">
              <div class="mission-image-container">
                <app-responsive-image
                  [images]="carouselImages.mission"
                  context="content"
                  loading="lazy"
                  cssClass="mission-image img-fluid"
                >
                </app-responsive-image>
              </div>
            </div>
            <div class="col-lg-6">
              <div class="mission-content">
                <h2 class="mission-title">
                  {{ "US.mission.title" | transloco }}
                </h2>
                <p class="mission-description">
                  {{ "US.mission.description" | transloco }}
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="carousel-item">
        <div class="container">
          <div class="mission-card row align-items-center my-5 g-5 py-5">
            <div class="col-lg-6">
              <div class="mission-image-container">
                <app-responsive-image
                  [images]="carouselImages.vision"
                  context="content"
                  loading="lazy"
                  cssClass="mission-image img-fluid"
                >
                </app-responsive-image>
              </div>
            </div>
            <div class="col-lg-6">
              <div class="mission-content">
                <h2 class="mission-title">
                  {{ "US.vision.title" | transloco }}
                </h2>
                <p class="mission-description">
                  {{ "US.vision.description" | transloco }}
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
<app-video-section
  title="Estrategía empresarial"
  titleHighlight="efectiva"
  description="Descubre cómo hacemos realidad negocios exitosos"
  videoId="m3nb8767sm"
  videoTitle="¿Qué hace Start Companies LLC ? | Soluciones en Contabilidad, Impuestos y Tecnología para tu LLC"
></app-video-section>
<app-us-potential></app-us-potential>
<app-us-proposal></app-us-proposal>
<app-sc-footer></app-sc-footer>
<!-- Botón flotante central inferior -->
<div
  class="fixed-bottom d-flex justify-content-center mb-4 boton-flotante-oculto"
>
  <button
    data-cal-link="startcompanies-businessenusa/agenda-organica"
    data-cal-namespace="agenda-organica"
    data-cal-config='{"layout":"month_view","theme":"light"}'
    type="button"
    class="btn sc-btn-accent px-4 py-3 shadow-lg"
  >
    Agendar llamada <i class="bi bi-arrow-right ms-2"></i>
  </button>
</div>
